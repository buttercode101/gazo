<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0A0A" />
    <title>TankUp | Offline</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(1200px 700px at 20% 10%, #1a2638 0%, #0b111b 55%, #070b12 100%);
        color: #fff;
      }
      .card {
        width: min(560px, 92vw);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 20px;
        background: rgba(13, 19, 32, 0.88);
        backdrop-filter: blur(8px);
        padding: 28px;
        box-shadow: 0 24px 50px rgba(0, 0, 0, 0.5);
      }
      .badge {
        display: inline-block;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 12px;
        color: #ffab7a;
        margin-bottom: 10px;
      }
      h1 { margin: 0 0 10px; font-size: 1.8rem; }
      p { margin: 0 0 18px; color: rgba(255, 255, 255, 0.8); line-height: 1.5; }
      .actions { display: flex; gap: 10px; flex-wrap: wrap; }
      button {
        appearance: none;
        border: none;
        border-radius: 12px;
        padding: 12px 15px;
        font-weight: 700;
        cursor: pointer;
      }
      .primary { background: #ff6200; color: #fff; }
      .secondary { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.14); }
    </style>
  </head>
  <body>
    <main class="card" role="main">
      <span class="badge">TankUp Offline</span>
      <h1>You’re offline right now.</h1>
      <p>
        You can still use recently cached screens and map tiles. Reconnect to fetch latest station prices and sync reports.
      </p>
      <div class="actions">
        <button class="primary" onclick="location.reload()">Try again</button>
        <button class="secondary" onclick="location.href='/'">Open cached app</button>
      </div>
    </main>
  </body>
</html>
